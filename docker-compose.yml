services:
  obwiki:
    build: ./docker
    ports:
      - "8742:8742"
    volumes:
      - VAULT_PATH:/data/kbs
      - ./data:/app/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - LLMWIKI_KB_ROOT=/data/kbs
      - LLMWIKI_DB_PATH=/app/data/llmwiki.db
      - LLMWIKI_PORT=8742
    restart: unless-stopped
