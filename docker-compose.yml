services:
  api:
    build: ./api
    ports:
      - "${LLMWIKI_PORT:-8742}:8742"
    volumes:
      # 左侧: 你的 ob 库路径，右侧: Docker 内部固定路径
      - ${LLMWIKI_KB_ROOT:-.}:/data/kbs
      - ./api/data:/app/data
    environment:
      - LLMWIKI_KB_ROOT=/data/kbs
      - LLMWIKI_DB_PATH=/app/data/llmwiki.db
      - LLMWIKI_PORT=8742
    restart: unless-stopped
    # 挂载宿主机时区
    volumes:
      - ${LLMWIKI_KB_ROOT:-.}:/data/kbs
      - ./api/data:/app/data
      - /etc/localtime:/etc/localtime:ro
